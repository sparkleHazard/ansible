# Inventory that makes an alias for localhost that uses Python3
# localhost-py3 ansible_host=localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[localhost]
127.0.0.1

[localhost:vars]
ansible_python_interpreter=/usr/bin/python3

[dev]
192.168.50.161

[dev:vars]
ansible_python_interpreter=/usr/bin/python3

[app]
192.168.50.3
192.168.50.90

[app:vars]
ansible_python_interpreter=/usr/bin/python

[rasp]
pi@192.168.50.71
pi@192.168.50.72
pi@192.168.50.73

[app:vars]
ansible_python_interpreter=/usr/bin/python3

